<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Parts | Premium Hardware</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0b0e14;
            --card-bg: #161b22;
            --accent: #00f2ff;
            --accent-hover: #00d4e0;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --gradient: linear-gradient(135deg, #00f2ff 0%, #0072ff 100%);
            --danger: #ff4757;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }

        /* --- Навигация и Поиск --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: rgba(11, 14, 20, 0.9);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid #30363d; flex-wrap: wrap; gap: 15px;
        }

        .logo {
            font-size: 24px; font-weight: 800; letter-spacing: 2px;
            background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .search-container { flex-grow: 1; max-width: 500px; margin: 0 20px; }
        .search-container input {
            width: 100%; padding: 10px 20px; border-radius: 20px;
            border: 1px solid #30363d; background: #0d1117; color: white; outline: none; transition: 0.3s;
        }
        .search-container input:focus { border-color: var(--accent); }

        .nav-links button {
            background: none; border: none; color: var(--text-dim); margin-left: 20px;
            cursor: pointer; font-weight: 600; transition: 0.3s; font-size: 16px;
        }
        .nav-links button:hover, .nav-links button.active { color: var(--accent); }

        /* --- Категории --- */
        .categories {
            display: flex; justify-content: center; gap: 15px; padding: 20px; flex-wrap: wrap;
        }
        .cat-btn {
            background: var(--card-bg); color: var(--text-dim); border: 1px solid #30363d;
            padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .cat-btn:hover, .cat-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        /* --- Контент --- */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .section-title { font-size: 32px; margin-bottom: 30px; border-left: 5px solid var(--accent); padding-left: 15px; }

        /* --- Сетка товаров --- */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            border: 1px solid #30363d; transition: all 0.3s; display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 5px 20px rgba(0, 242, 255, 0.1); }
        .product-img {
            width: 100%; height: 200px; background: #0d1117; border-radius: 12px;
            margin-bottom: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-title { font-size: 18px; margin-bottom: 5px; font-weight: 600; }
        .product-desc { font-size: 13px; color: var(--text-dim); margin-bottom: 15px; flex-grow: 1; }
        .price { font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 15px; }
        
        .card-actions { display: flex; gap: 10px; }
        .btn { padding: 10px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; border: none; flex: 1; text-align: center; }
        .btn-buy { background: var(--gradient); color: white; }
        .btn-buy:hover { box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        .btn-cart { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
        .btn-cart:hover { background: rgba(0, 242, 255, 0.1); }

        /* --- Корзина --- */
        #cart-view { display: none; }
        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); padding: 15px 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #30363d;
        }
        .cart-item-info { display: flex; align-items: center; gap: 15px; }
        .cart-item-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .remove-btn { color: var(--danger); background: none; border: none; cursor: pointer; font-weight: bold; }
        .cart-total { text-align: right; font-size: 24px; font-weight: bold; margin-top: 20px; color: var(--accent); }
        .checkout-all-btn { float: right; margin-top: 15px; padding: 15px 30px; background: var(--gradient); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }

        /* --- Плавающая кнопка корзины --- */
        .floating-cart {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background: var(--gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 20px rgba(0, 242, 255, 0.3); cursor: pointer; z-index: 1000; transition: 0.3s;
        }
        .floating-cart:hover { transform: scale(1.1); }
        .cart-badge {
            position: absolute; top: -5px; right: -5px; background: var(--danger); color: white;
            font-size: 12px; font-weight: bold; width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .cart-icon { font-size: 24px; color: white; }

        /* --- Модальное окно --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none; align-items: center; justify-content: center;
            z-index: 2000; backdrop-filter: blur(5px);
        }
        .modal {
            background: var(--card-bg); width: 90%; max-width: 450px; padding: 30px;
            border-radius: 24px; border: 1px solid var(--accent);
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-dim); font-size: 14px; }
        .form-group input {
            width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d;
            border-radius: 8px; color: white; outline: none;
        }
        .form-group input:focus { border-color: var(--accent); }
        .close-btn { float: right; color: var(--text-dim); cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="switchTab('home')">PC PARTS</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Поиск комплектующих..." onkeyup="handleSearch()">
        </div>
        <div class="nav-links">
            <button id="btn-home" class="active" onclick="switchTab('home')">Каталог</button>
            <button id="btn-cart" onclick="switchTab('cart')">Корзина</button>
        </div>
    </nav>

    <div class="categories" id="category-filters">
        <button class="cat-btn active" onclick="filterCategory('Все')">Все</button>
        <button class="cat-btn" onclick="filterCategory('Видеокарты')">Видеокарты</button>
        <button class="cat-btn" onclick="filterCategory('Процессоры')">Процессоры</button>
        <button class="cat-btn" onclick="filterCategory('Накопители')">Накопители</button>
        <button class="cat-btn" onclick="filterCategory('Блоки питания')">Блоки питания</button>
    </div>

    <div class="container" id="home-view">
        <div class="products-grid" id="products-container">
            </div>
    </div>

    <div class="container" id="cart-view">
        <h1 class="section-title">Ваша корзина</h1>
        <div id="cart-items-container">
            </div>
        <div id="cart-footer" style="display: none; overflow: hidden;">
            <div class="cart-total">Итого: <span id="cart-total-price">0</span> сом</div>
            <button class="checkout-all-btn" onclick="openOrder('Корзина', true)">Оформить заказ</button>
        </div>
        <div id="empty-cart-msg" style="text-align: center; padding: 50px 0; color: var(--text-dim);">
            <h2>Пусто</h2>
            <p>Вы еще ничего не добавили.</p>
        </div>
    </div>

    <div class="floating-cart" onclick="switchTab('cart')">
        <div class="cart-badge" id="cart-badge">0</div>
        <span class="cart-icon">🛒</span>
    </div>

    <div class="modal-overlay" id="overlay">
        <div class="modal">
            <span class="close-btn" onclick="closeOrder()">&times;</span>
            <div id="modal-form">
                <h2>Оформление заказа</h2>
                <p id="selected-item" style="color: var(--accent); margin-bottom: 20px; font-weight: bold;"></p>
                <div class="form-group">
                    <label>Ваше ФИО</label>
                    <input type="text" placeholder="Иван Иванов">
                </div>
                <div class="form-group">
                    <label>Номер телефона</label>
                    <input type="tel" placeholder="+996 555 123 456">
                </div>
                <button class="btn btn-buy" style="width: 100%; padding: 15px; margin-top: 10px;" onclick="processOrder()">Подтвердить покупку</button>
            </div>
            <div id="modal-success" style="display: none; text-align: center; color: #00ff88;">
                <h2 style="font-size: 50px;">✔</h2>
                <h3>Заказ успешно оформлен!</h3>
                <p style="color: var(--text-dim); margin-top: 10px;">Мы позвоним вам в ближайшее время.</p>
                <button class="btn btn-buy" style="background: #30363d; margin-top: 20px; width: 100%;" onclick="closeOrder()">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        // База данных товаров (реалистичные цены в сомах)
        const products = [
    { id: 1, name: "NVIDIA RTX 4060 8GB", category: "Видеокарты", price: 29500, img: "img/gpu_4060.jpg", desc: "Отличный выбор для Full HD гейминга на ультра настройках." },
    { id: 2, name: "AMD Radeon RX 7600", category: "Видеокарты", price: 26000, img: "img/gpu_7600.jpg", desc: "Конкурент от красных. Отличная производительность за свои деньги." },
    { id: 3, name: "NVIDIA RTX 4070 12GB", category: "Видеокарты", price: 56000, img: "img/gpu_4070.jpg", desc: "Золотая середина для 2K гейминга с трассировкой лучей." },
    
    { id: 4, name: "Intel Core i5-13400F", category: "Процессоры", price: 16500, img: "img/cpu_i5.jpg", desc: "10 ядер, 16 потоков. Идеальный баланс для игр и работы." },
    { id: 5, name: "AMD Ryzen 5 7600", category: "Процессоры", price: 18000, img: "img/cpu_ryzen.jpg", desc: "Новый сокет AM5, высокая частота и крутой потенциал." },
    
    { id: 6, name: "Kingston NV2 1TB M.2", category: "Накопители", price: 5500, img: "img/ssd_knv2.jpg", desc: "Быстрый NVMe SSD для мгновенной загрузки Windows и игр." },
    { id: 7, name: "Samsung 980 PRO 1TB", category: "Накопители", price: 9500, img: "img/ssd_980pro.jpg", desc: "Топовый SSD PCIe 4.0 со скоростью чтения до 7000 МБ/с." },
    
    { id: 8, name: "DeepCool PK750D 750W", category: "Блоки питания", price: 6500, img: "img/psu_deepcool.jpg", desc: "Надежный блок питания с сертификатом 80+ Bronze." },
    { id: 9, name: "Corsair RM850e 850W", category: "Блоки питания", price: 11500, img: "img/psu_corsair.jpg", desc: "Полностью модульный, тихий и очень мощный (80+ Gold)." }
];
        
        let cart = [];
        let currentCategory = 'Все';

        // Рендер товаров
        function renderProducts(items) {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            
            if (items.length === 0) {
                container.innerHTML = '<p style="color:var(--text-dim); grid-column: 1/-1;">Ничего не найдено...</p>';
                return;
            }

            items.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-img"><img src="${product.img}" alt="${product.name}"></div>
                    <div style="font-size: 12px; color: var(--accent); margin-bottom: 5px;">${product.category}</div>
                    <h3 class="product-title">${product.name}</h3>
                    <p class="product-desc">${product.desc}</p>
                    <div class="price">${product.price.toLocaleString('ru-RU')} сом</div>
                    <div class="card-actions">
                        <button class="btn btn-buy" onclick="openOrder('${product.name}', false)">Купить</button>
                        <button class="btn btn-cart" onclick="addToCart(${product.id})">+ В корзину</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Фильтрация
        function filterCategory(category) {
            currentCategory = category;
            
            // Обновляем активную кнопку
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText === category) btn.classList.add('active');
            });

            handleSearch(); // Применяем фильтр вместе с поиском
        }

        // Поиск
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => {
                const matchesCategory = currentCategory === 'Все' || p.category === currentCategory;
                const matchesSearch = p.name.toLowerCase().includes(query);
                return matchesCategory && matchesSearch;
            });
            renderProducts(filtered);
        }

        // Добавление в корзину
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCartUI();
            
            // Анимация бейджа
            const badge = document.getElementById('cart-badge');
            badge.style.transform = 'scale(1.5)';
            setTimeout(() => badge.style.transform = 'scale(1)', 200);
        }

        // Удаление из корзины
        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        // Обновление корзины
        function updateCartUI() {
            document.getElementById('cart-badge').innerText = cart.length;
            const container = document.getElementById('cart-items-container');
            const footer = document.getElementById('cart-footer');
            const emptyMsg = document.getElementById('empty-cart-msg');
            
            container.innerHTML = '';
            
            if (cart.length === 0) {
                footer.style.display = 'none';
                emptyMsg.style.display = 'block';
            } else {
                footer.style.display = 'block';
                emptyMsg.style.display = 'none';
                
                let total = 0;
                cart.forEach((item, index) => {
                    total += item.price;
                    container.innerHTML += `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                <img src="${item.img}" class="cart-item-img">
                                <div>
                                    <h4>${item.name}</h4>
                                    <div style="color: var(--accent); font-weight: bold;">${item.price.toLocaleString('ru-RU')} сом</div>
                                </div>
                            </div>
                            <button class="remove-btn" onclick="removeFromCart(${index})">✕ Удалить</button>
                        </div>
                    `;
                });
                document.getElementById('cart-total-price').innerText = total.toLocaleString('ru-RU');
            }
        }

        // Переключение вкладок
        function switchTab(tab) {
            const homeView = document.getElementById('home-view');
            const cartView = document.getElementById('cart-view');
            const filters = document.getElementById('category-filters');
            
            if(tab === 'home') {
                homeView.style.display = 'block';
                filters.style.display = 'flex';
                cartView.style.display = 'none';
                document.getElementById('btn-home').classList.add('active');
                document.getElementById('btn-cart').classList.remove('active');
            } else {
                homeView.style.display = 'none';
                filters.style.display = 'none';
                cartView.style.display = 'block';
                document.getElementById('btn-home').classList.remove('active');
                document.getElementById('btn-cart').classList.add('active');
            }
        }

        // Модальное окно заказа
        const overlay = document.getElementById('overlay');
        let isCartCheckout = false;

        function openOrder(itemName, fromCart = false) {
            isCartCheckout = fromCart;
            document.getElementById('selected-item').innerText = fromCart ? "Оформление всех товаров из корзины" : "Вы выбрали: " + itemName;
            overlay.style.display = 'flex';
            document.getElementById('modal-form').style.display = 'block';
            document.getElementById('modal-success').style.display = 'none';
        }

        function closeOrder() {
            overlay.style.display = 'none';
        }

        function processOrder() {
            const btn = document.querySelector('#modal-form .btn-buy');
            btn.innerText = "Обработка...";
            btn.disabled = true;

            setTimeout(() => {
                document.getElementById('modal-form').style.display = 'none';
                document.getElementById('modal-success').style.display = 'block';
                btn.innerText = "Подтвердить покупку";
                btn.disabled = false;
                
                if(isCartCheckout) {
                    cart = [];
                    updateCartUI();
                    switchTab('home');
                }
            }, 1500);
        }

        // Инициализация
        renderProducts(products);
    </script>
</body>
</html>
