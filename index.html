<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC MASTER PRO | Premium Hardware</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #05070a;
            --card: rgba(22, 27, 34, 0.7);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --text: #ffffff;
            --text-dim: #8b949e;
            --border: #30363d;
            --grad: linear-gradient(135deg, #00f2ff 0%, #0072ff 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #0a1120 0%, var(--bg) 100%);
        }

        /* --- ЭКРАН РЕГИСТРАЦИИ --- */
        #auth-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .auth-card {
            background: var(--card); padding: 40px; border-radius: 24px;
            border: 1px solid var(--accent); width: 100%; max-width: 400px;
            text-align: center; backdrop-filter: blur(20px);
            box-shadow: 0 0 50px var(--accent-glow);
        }
        .auth-logo { 
            font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 900;
            margin-bottom: 20px; background: var(--grad); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- НАВИГАЦИЯ --- */
        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); padding: 15px 5%;
            display: none; align-items: center; justify-content: space-between;
            gap: 15px; animation: slideDown 0.5s ease;
        }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }

        .logo-group { display: flex; align-items: center; gap: 15px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 800; color: var(--accent); cursor: pointer; }
        .user-badge { 
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--accent);
            padding: 4px 12px; border-radius: 12px; font-size: 13px; color: var(--accent);
            display: flex; align-items: center; gap: 6px; font-weight: 600;
        }

        .search-box { flex: 1; max-width: 300px; }
        .search-box input {
            width: 100%; padding: 10px 15px; border-radius: 10px;
            background: #010409; border: 1px solid var(--border); color: white; outline: none;
        }

        .nav-btns { display: flex; gap: 10px; }
        .nav-btns button {
            background: none; border: none; color: var(--text-dim);
            font-weight: 600; cursor: pointer; padding: 8px; transition: 0.3s; font-size: 14px;
        }
        .nav-btns button.active { color: var(--accent); }

        /* --- КАРТОЧКИ --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; display: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; padding-top: 20px; }
        
        .card {
            background: var(--card); border-radius: 20px; border: 1px solid var(--border);
            padding: 20px; display: flex; flex-direction: column; transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        
        .img-wrap { 
            width: 100%; height: 180px; border-radius: 12px; overflow: hidden; 
            background: #010409; margin-bottom: 15px; display: flex; align-items: center; justify-content: center;
        }
        .img-wrap img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        .c-title { font-size: 17px; font-weight: 700; margin-bottom: 10px; height: 42px; overflow: hidden; }
        .c-price { font-size: 20px; font-weight: 800; color: var(--accent); margin-top: auto; padding: 10px 0; }
        
        .btn { padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; transition: 0.3s; width: 100%; }
        .btn-buy { background: var(--grad); color: white; box-shadow: 0 0 15px var(--accent-glow); }

        /* --- КОРЗИНА --- */
        .cart-item {
            display: flex; align-items: center; gap: 15px; background: var(--card);
            padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border);
        }
        .cart-img { width: 50px; height: 50px; object-fit: contain; background: #000; border-radius: 5px; }

        /* --- ФИЛЬТРЫ --- */
        .cats { display: flex; gap: 10px; padding-bottom: 20px; overflow-x: auto; }
        .cat-btn { 
            padding: 8px 16px; border-radius: 10px; background: var(--card); 
            border: 1px solid var(--border); color: white; cursor: pointer; white-space: nowrap;
        }
        .cat-btn.active { border-color: var(--accent); color: var(--accent); }

        /* --- ПУСТО --- */
        #empty-view { text-align: center; padding: 100px 20px; }
        .big-empty { font-family: 'Orbitron'; font-size: 60px; opacity: 0.05; font-weight: 900; }

        .float-cart {
            position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px;
            background: var(--grad); border-radius: 18px; display: none;
            align-items: center; justify-content: center; cursor: pointer; z-index: 100;
        }
        .badge { position: absolute; top: -5px; right: -5px; background: #ff4757; width: 22px; height: 22px; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-logo">PC MASTER</div>
            <p style="color: var(--text-dim); margin-bottom: 20px; font-size: 14px;">Вход в панель управления магазином</p>
            <input type="text" id="regName" class="f-input" placeholder="Никнейм..." style="width:100%; padding:12px; border-radius:10px; background:#010409; border:1px solid var(--border); color:white; outline:none; margin-bottom:15px;">
            <button class="btn btn-buy" onclick="login()">ЗАПУСТИТЬ СИСТЕМУ</button>
        </div>
    </div>

    <nav id="mainNav">
        <div class="logo-group">
            <div class="logo" onclick="showTab('home')">PC MASTER</div>
            <div class="user-badge">👤 <span id="userNick">User</span></div>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск..." onkeyup="search()">
        </div>
        <div class="nav-btns">
            <button id="tab-home" class="active" onclick="showTab('home')">КАТАЛОГ</button>
            <button id="tab-cart" onclick="showTab('cart')">КОРЗИНА</button>
            <button id="tab-empty" onclick="showTab('empty')">АКЦИИ</button>
        </div>
    </nav>

    <div id="home-view" class="container">
        <div class="cats">
            <button class="cat-btn active" onclick="filter('Все')">Все</button>
            <button class="cat-btn" onclick="filter('Процессоры')">Процессоры</button>
            <button class="cat-btn" onclick="filter('Видеокарты')">Видеокарты</button>
            <button class="cat-btn" onclick="filter('Накопители')">Накопители</button>
        </div>
        <div class="grid" id="productGrid"></div>
    </div>

    <div id="cart-view" class="container" style="max-width: 700px;">
        <h2 style="font-family: 'Orbitron'; margin-bottom: 20px; color: var(--accent);">КОРЗИНА</h2>
        <div id="cartList"></div>
        <div id="cartSummary" style="margin-top: 20px; padding: 20px; background: var(--card); border-radius: 15px; border: 1px solid var(--accent); display: none; text-align: right;">
            <p style="color: var(--text-dim)">Сумма к оплате:</p>
            <h2 id="totalPrice" style="color: var(--accent); font-size: 28px; margin: 10px 0;">0 сом</h2>
            <button class="btn btn-buy" onclick="checkout()">ОФОРМИТЬ</button>
        </div>
        <div id="cartEmptyMsg" style="text-align: center; color: var(--text-dim); padding: 50px;">
            <p>Ваша корзина пока пуста</p>
        </div>
    </div>

    <div id="empty-view" class="container">
        <div class="big-empty">ПУСТО</div>
        <p style="text-align: center; color: var(--accent); font-weight: 800;">ЗДЕСЬ БУДУТ ВАШИ АКЦИИ</p>
    </div>

    <div class="float-cart" id="floatBtn" onclick="showTab('cart')">
        <div class="badge" id="cartBadge">0</div>
        <span>🛒</span>
    </div>

    <script>
        // БАЗА ДАННЫХ С ПРОВЕРЕННЫМИ ССЫЛКАМИ
        const db = [
            { id: 1, cat: "Видеокарты", name: "ASUS Dual RTX 4060", price: 29500, img: "https://www.asus.com/media/Odin/Websites/global/ProductLine/20230511115315.png?webp" },
            { id: 2, cat: "Процессоры", name: "Intel Core i5-13400F", price: 16500, img: "https://img.procpu.kz/images/intel-core-i5-13400f_4.png" },
            { id: 3, cat: "Видеокарты", name: "MSI Ventus RTX 4070", price: 56000, img: "https://storage-asset.msi.com/global/picture/image/feature/vga/NVIDIA/RTX-4070-VENTUS-3X/rtx-4070-ventus-3x-oc-board.png" },
            { id: 4, cat: "Процессоры", name: "AMD Ryzen 5 7600", price: 18000, img: "https://www.amd.com/system/files/2022-08/1564287-ryzen-5-pi-600x600.png" },
            { id: 5, cat: "Накопители", name: "SSD Kingston NV2 1TB", price: 5500, img: "https://media.kingston.com/images/products/NV2_main_600x600.png" },
            { id: 6, cat: "Накопители", name: "Samsung 980 PRO 1TB", price: 9500, img: "https://images.samsung.com/is/image/samsung/p6pim/ru/mz-v8p1t0bw/gallery/ru-980-pro-nvme-m2-ssd-mz-v8p1t0bw-326938995" },
            { id: 7, cat: "Видеокарты", name: "Palit RTX 4060 Ti", price: 38000, img: "https://www.palit.com/product/vga/picture/p04653/p04653_g_1.png" },
            { id: 8, cat: "Процессоры", name: "AMD Ryzen 7 7800X3D", price: 35000, img: "https://www.amd.com/system/files/2023-01/1815147-ryzen-7-x3d-pi-600x600.png" }
        ];

        let cart = [];

        // ВХОД В СИСТЕМУ
        function login() {
            const name = document.getElementById('regName').value;
            if (name.trim().length < 2) {
                alert("Введите имя!");
                return;
            }

            // Установка имени
            document.getElementById('userNick').innerText = name;
            
            // Скрытие экрана входа и показ интерфейса
            document.getElementById('auth-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('mainNav').style.display = 'flex';
                document.getElementById('home-view').style.display = 'block';
                document.getElementById('floatBtn').style.display = 'flex';
                
                // ВАЖНО: Отрисовка происходит только после входа!
                renderProducts(db);
            }, 600);
        }

        // ОТРИСОВКА
        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(p => `
                <div class="card">
                    <div class="img-wrap"><img src="${p.img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/200?text=PC+PART'"></div>
                    <div style="font-size: 10px; color: var(--accent); font-weight: 800;">${p.cat.toUpperCase()}</div>
                    <div class="c-title">${p.name}</div>
                    <div class="c-price">${p.price.toLocaleString()} сом</div>
                    <button class="btn btn-buy" onclick="addToCart(${p.id})">В КОРЗИНУ</button>
                </div>
            `).join('');
        }

        // ЛОГИКА КОРЗИНЫ
        function addToCart(id) {
            const item = db.find(x => x.id === id);
            cart.push(item);
            updateCart();
            
            const badge = document.getElementById('cartBadge');
            badge.style.transform = 'scale(1.4)';
            setTimeout(() => badge.style.transform = 'scale(1)', 200);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cartBadge').innerText = cart.length;
            const list = document.getElementById('cartList');
            const summary = document.getElementById('cartSummary');
            const emptyMsg = document.getElementById('cartEmptyMsg');

            if (cart.length === 0) {
                list.innerHTML = '';
                summary.style.display = 'none';
                emptyMsg.style.display = 'block';
            } else {
                emptyMsg.style.display = 'none';
                summary.style.display = 'block';
                list.innerHTML = cart.map((p, i) => `
                    <div class="cart-item">
                        <img src="${p.img}" class="cart-img">
                        <div style="flex: 1;">
                            <h4 style="font-size: 14px;">${p.name}</h4>
                            <p style="color: var(--accent); font-weight: 800;">${p.price.toLocaleString()} сом</p>
                        </div>
                        <button onclick="removeFromCart(${i})" style="background: none; border: none; color: #ff4757; cursor: pointer; font-size: 12px; font-weight: 800;">УДАЛИТЬ</button>
                    </div>
                `).join('');
                
                const total = cart.reduce((s, p) => s + p.price, 0);
                document.getElementById('totalPrice').innerText = total.toLocaleString() + ' сом';
            }
        }

        // ВКЛАДКИ
        function showTab(t) {
            document.querySelectorAll('.container').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.nav-btns button').forEach(b => b.classList.remove('active'));
            
            document.getElementById(t + '-view').style.display = 'block';
            document.getElementById('tab-' + t).classList.add('active');
            window.scrollTo(0,0);
        }

        // ПОИСК И ФИЛЬТРЫ
        function search() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = db.filter(p => p.name.toLowerCase().includes(query));
            renderProducts(filtered);
        }

        function filter(c) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const filtered = c === 'Все' ? db : db.filter(p => p.cat === c);
            renderProducts(filtered);
        }

        function checkout() {
            alert("Система: Заказ для " + document.getElementById('userNick').innerText + " принят!");
            cart = [];
            updateCart();
            showTab('home');
        }
    </script>
</body>
                </html>
