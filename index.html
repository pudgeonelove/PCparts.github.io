<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC MASTER | PRO STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card: rgba(22, 27, 34, 0.9);
            --accent: #00f2ff;
            --text: #ffffff;
            --border: #30363d;
            --grad: linear-gradient(135deg, #00f2ff 0%, #0072ff 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- ЭКРАН ВХОДА (РАЗМЫТИЕ) --- */
        #auth-overlay {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center;
            transition: 0.5s;
        }
        .auth-card {
            background: var(--card); padding: 40px; border-radius: 24px;
            border: 1px solid var(--accent); width: 90%; max-width: 400px;
            text-align: center; box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
        }

        /* --- ШАПКА --- */
        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(13, 17, 23, 0.9); border-bottom: 1px solid var(--border);
            padding: 15px 5%; display: flex; align-items: center; justify-content: space-between;
        }
        .logo { font-family: 'Orbitron'; color: var(--accent); font-size: 20px; }
        .user-info { background: rgba(0, 242, 255, 0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--accent); font-size: 14px; }

        /* --- КАТАЛОГ --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card {
            background: var(--card); border-radius: 20px; border: 1px solid var(--border);
            padding: 20px; transition: 0.3s; display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .img-wrap { width: 100%; height: 200px; background: #111; border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .c-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
        .c-price { font-size: 22px; font-weight: 900; color: var(--accent); margin-top: auto; }

        /* --- КНОПКИ --- */
        .btn { 
            width: 100%; padding: 12px; border-radius: 10px; border: none; 
            font-weight: 800; cursor: pointer; transition: 0.2s; margin-top: 15px;
        }
        .btn-main { background: var(--grad); color: white; }
        .btn-main:hover { opacity: 0.9; transform: scale(1.02); }

        /* --- МОДАЛКА ЗАКАЗА --- */
        #order-modal {
            position: fixed; inset: 0; z-index: 10001;
            background: rgba(0,0,0,0.85); display: none;
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: #161b22; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 500px; border: 1px solid var(--accent);
        }

        /* --- КОРЗИНА --- */
        .cart-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #333;
        }

        .view { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="font-family:'Orbitron'; margin-bottom: 10px;">LOGIN</h1>
            <p style="color: #8b949e; margin-bottom: 25px;">Войдите в свой профиль PC MASTER</p>
            <input type="text" id="userNameInput" placeholder="Ваш ник..." style="width:100%; padding:12px; border-radius:10px; background:#000; border:1px solid var(--border); color:white; margin-bottom:15px; outline:none;">
            <button class="btn btn-main" onclick="enterApp()">ВОЙТИ В МАГАЗИН</button>
        </div>
    </div>

    <nav>
        <div class="logo">PC MASTER</div>
        <div style="display: flex; gap: 20px;">
            <button onclick="showTab('home')" style="background:none; border:none; color:white; cursor:pointer; font-weight:700;">Каталог</button>
            <button onclick="showTab('cart')" style="background:none; border:none; color:white; cursor:pointer; font-weight:700;">Корзина (<span id="cartCount">0</span>)</button>
        </div>
        <div class="user-info">👤 <span id="displayNick">Гость</span></div>
    </nav>

    <div id="home-view" class="container active">
        <div class="grid" id="productGrid"></div>
    </div>

    <div id="cart-view" class="container">
        <h2 style="margin-bottom: 20px; font-family:'Orbitron';">ВАШИ ТОВАРЫ</h2>
        <div id="cartList"></div>
        <div id="cartTotalBox" style="margin-top: 30px; text-align: right; display: none;">
            <h3>Итого: <span id="totalPrice" style="color:var(--accent)">0</span> сом</h3>
            <button class="btn btn-main" style="max-width: 300px;" onclick="openOrderModal()">ОФОРМИТЬ ЗАКАЗ</button>
        </div>
    </div>

    <div id="order-modal">
        <div class="modal-content">
            <h2 style="color:var(--accent); margin-bottom: 15px;">ОФОРМЛЕНИЕ</h2>
            <div id="orderSummary"></div>
            <hr style="margin: 15px 0; opacity: 0.1;">
            <p>Покупатель: <b id="orderUser"></b></p>
            <button class="btn btn-main" onclick="confirmOrder()">ПОДТВЕРДИТЬ ПОКУПКУ</button>
            <button class="btn" style="background:#333; color:white;" onclick="closeOrderModal()">ОТМЕНА</button>
        </div>
    </div>

    <script>
        const db = [
            { id: 1, name: "RTX 4060 Ti Gaming OC", price: 39000, img: "https://placehold.co/400x300/161b22/00f2ff?text=RTX+4060+Ti" },
            { id: 2, name: "Intel Core i7-13700K", price: 35000, img: "https://placehold.co/400x300/161b22/00f2ff?text=i7-13700K" },
            { id: 3, name: "Samsung 980 PRO 1TB", price: 9500, img: "https://placehold.co/400x300/161b22/00f2ff?text=SSD+Samsung" },
            { id: 4, name: "Corsair Vengeance 32GB", price: 12000, img: "https://placehold.co/400x300/161b22/00f2ff?text=RAM+Corsair" },
            { id: 5, name: "DeepCool AK620 White", price: 6500, img: "https://placehold.co/400x300/161b22/00f2ff?text=Cooler" },
            { id: 6, name: "MSI MPG Z790 Edge", price: 31000, img: "https://placehold.co/400x300/161b22/00f2ff?text=Z790+Motherboard" }
        ];

        let cart = [];

        // ВХОД
        function enterApp() {
            const nick = document.getElementById('userNameInput').value;
            if (nick.trim() === "") return alert("Введите ник!");
            document.getElementById('displayNick').innerText = nick;
            document.getElementById('auth-overlay').style.opacity = "0";
            setTimeout(() => document.getElementById('auth-overlay').style.display = "none", 500);
        }

        // РЕНДЕР ТОВАРОВ (Вызывается сразу, чтобы было видно на фоне)
        function render() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = db.map(p => `
                <div class="card">
                    <div class="img-wrap"><img src="${p.img}" alt="${p.name}"></div>
                    <div class="c-title">${p.name}</div>
                    <div class="c-price">${p.price.toLocaleString()} сом</div>
                    <button class="btn btn-main" onclick="addToCart(${p.id})">В КОРЗИНУ</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = db.find(x => x.id === id);
            cart.push(product);
            document.getElementById('cartCount').innerText = cart.length;
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cartList');
            const totalBox = document.getElementById('cartTotalBox');
            if (cart.length === 0) {
                list.innerHTML = "<p>Корзина пуста</p>";
                totalBox.style.display = "none";
                return;
            }
            totalBox.style.display = "block";
            list.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <b>${item.price.toLocaleString()} сом</b>
                    <button onclick="removeItem(${index})" style="background:none; border:none; color:#ff4757; cursor:pointer;">❌</button>
                </div>
            `).join('');
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            document.getElementById('totalPrice').innerText = total.toLocaleString();
        }

        function removeItem(i) {
            cart.splice(i, 1);
            document.getElementById('cartCount').innerText = cart.length;
            updateCartUI();
        }

        function showTab(tab) {
            document.getElementById('home-view').classList.remove('active');
            document.getElementById('cart-view').classList.remove('active');
            document.getElementById(tab + '-view').classList.add('active');
        }

        // ОКНО ЗАКАЗА
        function openOrderModal() {
            document.getElementById('order-modal').style.display = "flex";
            document.getElementById('orderUser').innerText = document.getElementById('displayNick').innerText;
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            document.getElementById('orderSummary').innerHTML = `К оплате: <b>${total.toLocaleString()} сом</b> за ${cart.length} тов.`;
        }

        function closeOrderModal() {
            document.getElementById('order-modal').style.display = "none";
        }

        function confirmOrder() {
            alert("Поздравляем! Ваш заказ успешно оформлен. Скоро с вами свяжутся.");
            cart = [];
            document.getElementById('cartCount').innerText = "0";
            updateCartUI();
            closeOrderModal();
            showTab('home');
        }

        // Инициализация при загрузке
        render();
    </script>
</body>
</html>
