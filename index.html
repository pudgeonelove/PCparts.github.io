<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Parts</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>PC Parts - Магазин комплектующих</header>

<div class="container">

<div class="tabs">
<button class="tab-button active" onclick="showTab(1)">Каталог</button>
<button class="tab-button" onclick="showTab(2)">О нас</button>
</div>

<div id="tab1">
<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1591488320449-011701bb6704">
<div class="card-content">
<h3>RTX 3060</h3>
<p class="price">25 000 сом</p>
<button onclick="buy('RTX 3060')">Купить</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">
<div class="card-content">
<h3>Ryzen 5 5600</h3>
<p class="price">14 000 сом</p>
<button onclick="buy('Ryzen 5 5600')">Купить</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1585079542156-2755d9c8a094">
<div class="card-content">
<h3>SSD 1TB NVMe</h3>
<p class="price">6 000 сом</p>
<button onclick="buy('SSD 1TB')">Купить</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1587206668287-8f0c6f4a5f67">
<div class="card-content">
<h3>750W Gold PSU</h3>
<p class="price">5 000 сом</p>
<button onclick="buy('750W PSU')">Купить</button>
</div>
</div>

</div>
</div>

<div id="tab2" style="display:none;">
<h2>О нас</h2>
<p>PC Parts — магазин комплектующих с удобным подбором ПК.</p>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-content">
<h3>Оформление заказа</h3>
<p id="product"></p>
<input placeholder="Имя">
<input placeholder="Телефон">
<input placeholder="Адрес">
<button onclick="submitOrder()">Отправить</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
