<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC MASTER PRO | Next Gen Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #05070a;
            --card: rgba(22, 27, 34, 0.7);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --text: #ffffff;
            --text-dim: #8b949e;
            --border: #30363d;
            --grad: linear-gradient(135deg, #00f2ff 0%, #0072ff 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- ЭКРАН ВХОДА --- */
        #auth-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(circle at center, #111, #05070a);
            display: flex; align-items: center; justify-content: center;
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .auth-card {
            background: var(--card); padding: 40px; border-radius: 24px;
            border: 1px solid var(--accent); width: 90%; max-width: 400px;
            text-align: center; backdrop-filter: blur(20px);
            box-shadow: 0 0 50px var(--accent-glow);
        }
        .auth-logo { 
            font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 900;
            margin-bottom: 20px; background: var(--grad); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- НАВИГАЦИЯ --- */
        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); padding: 15px 5%;
            display: none; align-items: center; justify-content: space-between; gap: 15px;
        }

        .logo-group { display: flex; align-items: center; gap: 15px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 800; color: var(--accent); cursor: pointer; }
        .user-badge { 
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--accent);
            padding: 4px 12px; border-radius: 12px; font-size: 13px; color: var(--accent);
        }

        .nav-btns button {
            background: none; border: none; color: var(--text-dim);
            font-weight: 600; cursor: pointer; padding: 8px 15px; transition: 0.3s;
        }
        .nav-btns button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* --- КАРТОЧКИ --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; display: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        .card {
            background: var(--card); border-radius: 20px; border: 1px solid var(--border);
            padding: 20px; display: flex; flex-direction: column; transition: 0.3s;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .img-wrap { 
            width: 100%; height: 200px; border-radius: 12px; overflow: hidden; 
            background: #000; margin-bottom: 15px; display: flex; align-items: center; justify-content: center;
        }
        .img-wrap img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        .c-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; height: 44px; overflow: hidden; color: #fff; }
        .c-price { font-size: 22px; font-weight: 800; color: var(--accent); margin-bottom: 15px; }
        
        .btn-buy { 
            padding: 12px; border-radius: 10px; border: none; cursor: pointer; 
            font-weight: 700; background: var(--grad); color: white; width: 100%;
        }

        /* --- КОРЗИНА --- */
        .cart-item {
            display: flex; align-items: center; gap: 15px; background: var(--card);
            padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border);
        }
        .cart-img { width: 60px; height: 60px; object-fit: contain; background: #000; border-radius: 8px; }

        .float-cart {
            position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px;
            background: var(--grad); border-radius: 20px; display: none;
            align-items: center; justify-content: center; cursor: pointer; z-index: 100;
        }
        .badge { position: absolute; top: -5px; right: -5px; background: #ff4757; width: 24px; height: 24px; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; }

        input.f-input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--border); background: #010409; color: white; outline: none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-logo">PC MASTER</div>
            <input type="text" id="regName" class="f-input" placeholder="Введите ваш ник...">
            <button class="btn-buy" onclick="login()">ВОЙТИ В СИСТЕМУ</button>
        </div>
    </div>

    <nav id="mainNav">
        <div class="logo-group">
            <div class="logo" onclick="showTab('home')">PC MASTER</div>
            <div class="user-badge">👤 <span id="userNick">User</span></div>
        </div>
        <div class="nav-btns">
            <button id="tab-home" class="active" onclick="showTab('home')">КАТАЛОГ</button>
            <button id="tab-cart" onclick="showTab('cart')">КОРЗИНА</button>
            <button id="tab-empty" onclick="showTab('empty')">АКЦИИ</button>
        </div>
    </nav>

    <div id="home-view" class="container">
        <div class="grid" id="productGrid"></div>
    </div>

    <div id="cart-view" class="container" style="max-width: 800px;">
        <h2 style="font-family: 'Orbitron'; color: var(--accent); margin-bottom: 25px;">ВАША СБОРКА</h2>
        <div id="cartList"></div>
        <div id="cartSummary" style="margin-top: 20px; padding: 25px; background: var(--card); border-radius: 20px; border: 1px solid var(--accent); display: none; text-align: right;">
            <p style="color: var(--text-dim)">Итоговая стоимость:</p>
            <h2 id="totalPrice" style="color: var(--accent); font-size: 32px; margin: 10px 0;">0 сом</h2>
            <button class="btn-buy" onclick="checkout()" style="max-width: 250px;">ПОДТВЕРДИТЬ ЗАКАЗ</button>
        </div>
        <div id="cartEmptyMsg" style="text-align: center; padding: 100px 0; color: var(--text-dim);">
            <p>Корзина пуста. Добавьте комплектующие из каталога.</p>
        </div>
    </div>

    <div id="empty-view" class="container" style="text-align: center; padding-top: 150px;">
        <h1 style="font-family: 'Orbitron'; font-size: 80px; opacity: 0.05;">EMPTY</h1>
        <p style="color: var(--accent); letter-spacing: 5px;">ЗДЕСЬ ПОКА ПУСТО</p>
    </div>

    <div class="float-cart" id="floatBtn" onclick="showTab('cart')">
        <div class="badge" id="cartBadge">0</div>
        <span style="font-size: 24px;">🛒</span>
    </div>

    <script>
        // БАЗА ДАННЫХ С МАКСИМАЛЬНО СТАБИЛЬНЫМИ ССЫЛКАМИ
        const db = [
            { id: 1, cat: "Видеокарты", name: "NVIDIA GeForce RTX 4060", price: 32000, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/RTX_4060_Ti.png/640px-RTX_4060_Ti.png" },
            { id: 2, cat: "Процессоры", name: "Intel Core i5-13600K", price: 28500, img: "https://www.intel.com/content/dam/www/central-libraries/us/en/images/core-i5-badge-13th-gen-transparent-background.png.rendition.intel.web.480.270.png" },
            { id: 3, cat: "Видеокарты", name: "AMD Radeon RX 7800 XT", price: 54000, img: "https://www.amd.com/system/files/2023-08/1932431-radeon-rx-7800-xt-front-1260x709.png" },
            { id: 4, cat: "Процессоры", name: "AMD Ryzen 7 7800X3D", price: 38000, img: "https://www.amd.com/system/files/2023-01/1815147-ryzen-7-x3d-pi-600x600.png" },
            { id: 5, cat: "Накопители", name: "Samsung 990 Pro 2TB", price: 18500, img: "https://images.samsung.com/is/image/samsung/p6pim/ru/mz-v9p1t0bw/gallery/ru-990-pro-mz-v9p1t0bw-534244951" },
            { id: 6, cat: "Блоки питания", name: "Corsair RM850x Gold", price: 12000, img: "https://cwsmgmt.corsair.com/pdp/rmx-series-2021/images/rm850x_01.png" },
            { id: 7, cat: "Корпуса", name: "NZXT H7 Flow White", price: 11000, img: "https://www.datocms-assets.com/34299/1653035311-h7-flow-white-black-main.png" },
            { id: 8, cat: "Материнки", name: "ASUS ROG Strix Z790-E", price: 42000, img: "https://dlcdnwebimgs.asus.com/gain/49C8B568-7D9A-46E0-B6D7-90515668478A/w1000/h732" }
        ];

        let cart = [];

        function login() {
            const name = document.getElementById('regName').value;
            if (name.trim().length < 2) return alert("Введите никнейм!");
            
            document.getElementById('userNick').innerText = name;
            document.getElementById('auth-screen').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('mainNav').style.display = 'flex';
                document.getElementById('home-view').style.display = 'block';
                document.getElementById('floatBtn').style.display = 'flex';
                renderProducts(db);
            }, 600);
        }

        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(p => `
                <div class="card">
                    <div class="img-wrap">
                        <img src="${p.img}" alt="${p.name}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2038/2038933.png'">
                    </div>
                    <div style="font-size: 11px; color: var(--accent); letter-spacing: 1px;">${p.cat.toUpperCase()}</div>
                    <div class="c-title">${p.name}</div>
                    <div class="c-price">${p.price.toLocaleString()} сом</div>
                    <button class="btn-buy" onclick="addToCart(${p.id})">ДОБАВИТЬ В КОРЗИНУ</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = db.find(x => x.id === id);
            cart.push(item);
            updateCart();
            
            const btn = document.getElementById('floatBtn');
            btn.style.transform = 'scale(1.2)';
            setTimeout(() => btn.style.transform = 'scale(1)', 200);
        }

        function updateCart() {
            document.getElementById('cartBadge').innerText = cart.length;
            const list = document.getElementById('cartList');
            const summary = document.getElementById('cartSummary');
            const emptyMsg = document.getElementById('cartEmptyMsg');

            if (cart.length === 0) {
                list.innerHTML = '';
                summary.style.display = 'none';
                emptyMsg.style.display = 'block';
            } else {
                emptyMsg.style.display = 'none';
                summary.style.display = 'block';
                list.innerHTML = cart.map((p, i) => `
                    <div class="cart-item">
                        <img src="${p.img}" class="cart-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2038/2038933.png'">
                        <div style="flex: 1;">
                            <h4 style="font-size: 14px;">${p.name}</h4>
                            <p style="color: var(--accent); font-weight: 800;">${p.price.toLocaleString()} сом</p>
                        </div>
                        <button onclick="removeFromCart(${i})" style="background: none; border: none; color: #ff4757; cursor: pointer; font-weight: 800;">❌</button>
                    </div>
                `).join('');
                
                const total = cart.reduce((s, p) => s + p.price, 0);
                document.getElementById('totalPrice').innerText = total.toLocaleString() + ' сом';
            }
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function showTab(t) {
            document.querySelectorAll('.container').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.nav-btns button').forEach(b => b.classList.remove('active'));
            document.getElementById(t + '-view').style.display = 'block';
            document.getElementById('tab-' + t).classList.add('active');
            window.scrollTo(0,0);
        }

        function checkout() {
            alert("Заказ оформлен! Наш менеджер свяжется с " + document.getElementById('userNick').innerText);
            cart = [];
            updateCart();
            showTab('home');
        }
    </script>
</body>
</html>
