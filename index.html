<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PC Parts | Магазин комплектующих</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">PC PARTS</div>
        <div class="nav-links">
            <a href="#" onclick="showPage('home')">Главная</a>
            <a href="#" onclick="showPage('empty')">Корзина</a>
        </div>
    </nav>

    <main id="home-page">
        <h1>Комплектующие для ПК</h1>
        <div class="grid">
            <div class="card">
                <img src="https://via.placeholder.com/200x150?text=RTX+4090" alt="GPU">
                <h3>NVIDIA RTX 4090</h3>
                <p>Мощная видеокарта для гейминга.</p>
                <div class="price">150 000 сом</div>
                <button onclick="openModal('NVIDIA RTX 4090')">Купить</button>
            </div>
            </div>
    </main>

    <main id="empty-page" style="display:none;">
        <h1>Ваша корзина</h1>
        <p>пусто</p>
    </main>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Оформление заказа</h2>
            <p>Вы выбрали: <strong id="itemName"></strong></p>
            <input type="text" placeholder="Ваше имя">
            <input type="tel" placeholder="Номер телефона">
            <button onclick="confirmPurchase()">Подтвердить заказ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
