<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC MASTER | Магазин комплектующих</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #00f2ff;
            --text: #ffffff;
            --text-dim: #8b949e;
            --border: #30363d;
            --grad: linear-gradient(135deg, #00f2ff 0%, #0072ff 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- Навигация --- */
        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 15px 5%;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 15px;
        }

        .logo { font-size: 22px; font-weight: 800; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        
        .search-box { flex: 1; max-width: 400px; margin: 0 15px; }
        .search-box input {
            width: 100%; padding: 10px 20px; border-radius: 25px;
            background: #010409; border: 1px solid var(--border);
            color: white; outline: none; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        .nav-btns { display: flex; gap: 15px; }
        .nav-btns button {
            background: none; border: none; color: var(--text-dim);
            font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .nav-btns button.active, .nav-btns button:hover { color: var(--accent); }

        /* --- Фильтры --- */
        .cats { display: flex; justify-content: center; gap: 10px; padding: 20px; flex-wrap: wrap; }
        .cat-tag {
            padding: 8px 18px; border-radius: 20px; background: var(--card);
            border: 1px solid var(--border); color: var(--text-dim);
            cursor: pointer; font-size: 14px; transition: 0.3s;
        }
        .cat-tag.active, .cat-tag:hover { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

        /* --- Сетка товаров --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        
        .card {
            background: var(--card); border-radius: 15px; border: 1px solid var(--border);
            padding: 20px; display: flex; flex-direction: column; transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        
        .img-wrap { width: 100%; height: 180px; border-radius: 10px; overflow: hidden; background: #010409; margin-bottom: 15px; }
        .img-wrap img { width: 100%; height: 100%; object-fit: contain; }
        
        .c-cat { font-size: 11px; color: var(--accent); text-transform: uppercase; margin-bottom: 5px; }
        .c-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; min-height: 44px; }
        .c-price { font-size: 20px; font-weight: 800; color: var(--accent); margin-top: auto; padding: 15px 0; }
        
        .actions { display: flex; gap: 10px; }
        .btn { padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; flex: 1; transition: 0.3s; }
        .btn-buy { background: var(--grad); color: white; }
        .btn-cart { background: rgba(0, 242, 255, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .btn:hover { opacity: 0.8; }

        /* --- Вкладки --- */
        .view { display: none; }
        .view.active { display: block; }
        
        #empty-view { text-align: center; padding: 100px 0; }
        .big-text { font-size: 60px; font-weight: 800; color: #21262d; letter-spacing: 5px; }

        /* --- Корзина --- */
        .cart-item {
            display: flex; align-items: center; gap: 20px;
            background: var(--card); padding: 15px; border-radius: 12px;
            margin-bottom: 10px; border: 1px solid var(--border);
        }
        .cart-img { width: 60px; height: 60px; border-radius: 5px; object-fit: cover; }
        .cart-info { flex: 1; }
        .del-btn { color: #ff4757; background: none; border: none; cursor: pointer; font-size: 14px; }

        /* --- Плавающая корзина --- */
        .float-cart {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background: var(--grad); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; cursor: pointer; z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .badge {
            position: absolute; top: 0; right: 0; background: #ff4757;
            width: 22px; height: 22px; border-radius: 50%; font-size: 12px;
            display: flex; align-items: center; justify-content: center; font-weight: 800;
        }

        /* --- Модалка --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center;
            z-index: 2000;
        }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--accent); }
        input.f-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: #0d1117; color: white; outline: none; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showTab('home')">PC MASTER</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск по названию..." onkeyup="search()">
        </div>
        <div class="nav-btns">
            <button id="tab-home" class="active" onclick="showTab('home')">Каталог</button>
            <button id="tab-cart" onclick="showTab('cart')">Корзина</button>
            <button id="tab-empty" onclick="showTab('empty')">Спецпредложения</button>
        </div>
    </nav>

    <div id="home-view" class="view active">
        <div class="cats">
            <button class="cat-tag active" onclick="filter('Все')">Все</button>
            <button class="cat-tag" onclick="filter('Процессоры')">Процессоры</button>
            <button class="cat-tag" onclick="filter('Видеокарты')">Видеокарты</button>
            <button class="cat-tag" onclick="filter('Накопители')">Накопители</button>
            <button class="cat-tag" onclick="filter('Блоки питания')">БП</button>
        </div>
        <div class="container">
            <div class="grid" id="productGrid"></div>
        </div>
    </div>

    <div id="cart-view" class="view">
        <div class="container">
            <h2 style="margin-bottom: 20px;">Ваша корзина</h2>
            <div id="cartList"></div>
            <div id="cartSummary" style="margin-top: 30px; text-align: right; display: none;">
                <h3>Итого: <span id="totalPrice" style="color: var(--accent);">0</span> сом</h3>
                <button class="btn btn-buy" style="max-width: 200px; margin-top: 15px;" onclick="openOrder('Корзина')">Оформить всё</button>
            </div>
            <div id="cartEmptyMsg" style="text-align: center; color: var(--text-dim); padding-top: 50px;">
                <p>Тут пока ничего нет...</p>
            </div>
        </div>
    </div>

    <div id="empty-view" class="view">
        <div class="big-text">ПУСТО</div>
        <p style="text-align: center; color: var(--text-dim);">Скоро здесь появятся акции!</p>
    </div>

    <div class="float-cart" onclick="showTab('cart')">
        <div class="badge" id="cartBadge">0</div>
        <span>🛒</span>
    </div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <h2 id="orderTitle">Оформление</h2>
            <input type="text" class="f-input" placeholder="Ваше имя">
            <input type="tel" class="f-input" placeholder="Ваш телефон">
            <button class="btn btn-buy" style="width: 100%;" onclick="confirmOrder()">Подтвердить заказ</button>
            <button class="btn" style="width: 100%; background: none; color: var(--text-dim);" onclick="closeModal()">Отмена</button>
        </div>
    </div>

    <script>
        const db = [
            { id: 1, cat: "Видеокарты", name: "ASUS Dual RTX 4060", price: 29500, img: "https://dlcdnimgs.asus.com/gain/358872CB-B536-40D4-B474-061730B09A9B/w480" },
            { id: 2, cat: "Процессоры", name: "Intel Core i5-13400F", price: 16500, img: "https://www.intel.ru/content/dam/www/central-libraries/us/en/images/core-i5-badge-13th-gen-transparent-background.png.rendition.intel.web.480.270.png" },
            { id: 3, cat: "Видеокарты", name: "GIGABYTE RTX 4070", price: 56000, img: "https://www.gigabyte.com/Image/4982c70093864491ba68134747209930/Product/35402/webp/500" },
            { id: 4, cat: "Процессоры", name: "AMD Ryzen 5 7600", price: 18000, img: "https://www.amd.com/system/files/2022-08/1564287-ryzen-5-pi-600x600.png" },
            { id: 5, cat: "Накопители", name: "Kingston NV2 1TB", price: 5500, img: "https://media.kingston.com/images/products/NV2_main_600x600.png" },
            { id: 6, cat: "Накопители", name: "Samsung 980 PRO 1TB", price: 9500, img: "https://images.samsung.com/is/image/samsung/p6pim/ru/mz-v8p1t0bw/gallery/ru-980-pro-nvme-m2-ssd-mz-v8p1t0bw-326938995?$650_519_PNG$" },
            { id: 7, cat: "Блоки питания", name: "DeepCool PK750D", price: 6500, img: "https://ru.deepcool.com/download/png/15729_2557.png" },
            { id: 8, cat: "Блоки питания", name: "Corsair RM850e Gold", price: 11500, img: "https://m.media-amazon.com/images/I/71YV6mE3fWL._AC_SX679_.jpg" }
        ];

        let cart = [];
        let activeCat = 'Все';

        function render(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(p => `
                <div class="card">
                    <div class="img-wrap"><img src="${p.img}" alt="${p.name}"></div>
                    <div class="c-cat">${p.cat}</div>
                    <div class="c-title">${p.name}</div>
                    <div class="c-price">${p.price.toLocaleString()} сом</div>
                    <div class="actions">
                        <button class="btn btn-buy" onclick="openOrder('${p.name}')">Купить</button>
                        <button class="btn btn-cart" onclick="addToCart(${p.id})">В корзину</button>
                    </div>
                </div>
            `).join('');
        }

        function filter(c) {
            activeCat = c;
            document.querySelectorAll('.cat-tag').forEach(b => b.classList.toggle('active', b.innerText === c));
            search();
        }

        function search() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = db.filter(p => 
                (activeCat === 'Все' || p.cat === activeCat) && 
                p.name.toLowerCase().includes(query)
            );
            render(filtered);
        }

        function addToCart(id) {
            const p = db.find(x => x.id === id);
            cart.push(p);
            updateCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cartBadge').innerText = cart.length;
            const list = document.getElementById('cartList');
            const summary = document.getElementById('cartSummary');
            const empty = document.getElementById('cartEmptyMsg');
            
            if (cart.length === 0) {
                list.innerHTML = '';
                summary.style.display = 'none';
                empty.style.display = 'block';
            } else {
                empty.style.display = 'none';
                summary.style.display = 'block';
                list.innerHTML = cart.map((p, i) => `
                    <div class="cart-item">
                        <img src="${p.img}" class="cart-img">
                        <div class="cart-info">
                            <h4>${p.name}</h4>
                            <p style="color: var(--accent)">${p.price.toLocaleString()} сом</p>
                        </div>
                        <button class="del-btn" onclick="removeFromCart(${i})">Удалить</button>
                    </div>
                `).join('');
                const total = cart.reduce((sum, p) => sum + p.price, 0);
                document.getElementById('totalPrice').innerText = total.toLocaleString();
            }
        }

        function showTab(t) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btns button').forEach(b => b.classList.remove('active'));
            document.getElementById(`${t}-view`).classList.add('active');
            document.getElementById(`tab-${t}`).classList.add('active');
            window.scrollTo(0,0);
        }

        function openOrder(name) {
            document.getElementById('orderTitle').innerText = name === 'Корзина' ? 'Ваш заказ' : name;
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('orderModal').style.display = 'none'; }
        
        function confirmOrder() {
            alert('Заказ принят! Мы свяжемся с вами.');
            if (document.getElementById('orderTitle').innerText === 'Ваш заказ') {
                cart = [];
                updateCart();
                showTab('home');
            }
            closeModal();
        }

        // Старт
        render(db);
    </script>
</body>
</html>
